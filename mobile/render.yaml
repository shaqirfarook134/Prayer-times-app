services:
  - type: web
    name: prayer-times-api
    runtime: node
    env: node
    region: oregon
    plan: free
    buildCommand: echo "No build required - using native Node.js modules"
    startCommand: node server-production.js
    envVars:
      - key: NODE_ENV
        value: production
    healthCheckPath: /health
    autoDeploy: true
