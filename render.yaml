services:
  - type: web
    name: prayer-times-api
    runtime: go
    env: go
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: go build -o bin/api ./cmd/api
    startCommand: ./bin/api
    envVars:
      - key: GO_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: prayer-times-db
          property: connectionString
      - key: PORT
        value: "8080"
    healthCheckPath: /health
    autoDeploy: true
